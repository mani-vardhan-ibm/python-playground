apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-playground
  labels:
    app: python-playground
spec:
  replicas: 1
  selector:
    matchLabels:
      app: python-playground
  template:
    metadata:
      labels:
        app: python-playground
    spec:
      containers:
        - name: python-playground
          image: python-playground:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "apps/01-weather-app/app.py"]
          args: ["$(WEATHER_CITY)"]
          env:
            - name: WEATHER_CITY
              valueFrom:
                configMapKeyRef:
                  name: python-playground-config
                  key: weather_city
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: python-playground-config
data:
  weather_city: "London"
